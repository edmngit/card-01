<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Divina Comida - Assistente</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #1a1210;
            --bg-chat: #1e1614;
            --bg-user-msg: #c4632a;
            --bg-ai-msg: #2a201c;
            --bg-input: #241b17;
            --text-primary: #ffffff;
            --text-secondary: #ffffff;
            --text-user: #ffffff;
            --accent: #c4632a;
            --accent-glow: rgba(196, 99, 42, 0.2);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-warm: rgba(196, 99, 42, 0.15);
            --header-h: 56px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-main);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
        }

        /* ===== APP SHELL ===== */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        /* ===== HEADER ===== */
        .chat-header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: rgba(26, 18, 16, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-warm);
            z-index: 10;
            flex-shrink: 0;
        }

        .chat-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .brand-logo {
            height: 34px;
            width: auto;
            border-radius: 4px;
        }

        .chat-header .brand-name {
            font-weight: 600;
            font-size: 17px;
            letter-spacing: -0.3px;
        }

        .chat-header .status {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-header .status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .btn-clear {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }

        /* ===== MESSAGES AREA ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 12px;
            background: var(--bg-chat);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(196,99,42,0.2);
            border-radius: 3px;
        }

        /* ===== MESSAGE BUBBLES ===== */
        .msg-row {
            display: flex;
            margin-bottom: 8px;
            animation: msg-in 0.3s ease-out;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user {
            justify-content: flex-end;
        }

        .msg-row.ai {
            justify-content: flex-start;
        }

        .msg-bubble {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .msg-row.user .msg-bubble {
            background: var(--bg-user-msg);
            color: var(--text-user);
            border-bottom-right-radius: 6px;
        }

        .msg-row.ai .msg-bubble {
            background: var(--bg-ai-msg);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
            border: 1px solid var(--border-warm);
        }

        /* Markdown dentro das mensagens */
        .msg-bubble p { margin: 0 0 8px 0; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble strong { font-weight: 600; }
        .msg-bubble code {
            background: rgba(255,255,255,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .msg-bubble pre {
            background: rgba(0,0,0,0.3);
            padding: 10px 12px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }
        .msg-bubble pre code {
            background: none;
            padding: 0;
        }

        /* ===== IMAGENS DOS PRATOS ===== */
        .dish-image {
            width: 100%;
            max-width: 280px;
            border-radius: 12px;
            margin: 8px 0 4px 0;
            display: block;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .dish-image:active {
            transform: scale(0.97);
        }

        .dish-caption {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing-bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ===== ORDER CARD ===== */
        .order-card {
            background: linear-gradient(135deg, #1e1614 0%, #2a1f1a 100%);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 16px;
            margin-top: 10px;
            max-width: 92%;
            animation: msg-in 0.3s ease-out;
            box-shadow: 0 0 20px rgba(196, 99, 42, 0.15);
        }

        .order-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-warm);
        }

        .order-card-header .icon {
            font-size: 20px;
        }

        .order-card-header .title {
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: -0.2px;
        }

        .order-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .order-item-left {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .order-item-qty {
            font-weight: 700;
            color: var(--accent);
            font-size: 15px;
            min-width: 24px;
        }

        .order-item-info {
            flex: 1;
        }

        .order-item-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .order-item-obs {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            margin-top: 2px;
            font-style: italic;
        }

        .order-item-price {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
        }

        .order-divider {
            height: 1px;
            background: var(--border-warm);
            margin: 8px 0;
        }

        .order-totals {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .order-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: rgba(255,255,255,0.55);
        }

        .order-total-row.final {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 4px;
        }

        .order-total-row.final .label {
            color: var(--accent);
        }

        /* Welcome state */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            gap: 16px;
        }

        .welcome-logo {
            height: 72px;
            width: auto;
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 14px;
            max-width: 280px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }

        .suggestion-chip {
            background: rgba(196,99,42,0.08);
            border: 1px solid var(--border-warm);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-chip:hover {
            background: rgba(196,99,42,0.15);
            color: var(--text-primary);
            border-color: rgba(196,99,42,0.3);
        }

        /* ===== INPUT AREA ===== */
        .chat-input-area {
            flex-shrink: 0;
            padding: 10px 12px;
            padding-bottom: calc(10px + var(--safe-bottom));
            background: rgba(26, 18, 16, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-warm);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-warm);
            border-radius: 24px;
            padding: 6px 6px 6px 16px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(196, 99, 42, 0.4);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            resize: none;
            max-height: 120px;
            padding: 8px 0;
            line-height: 1.4;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
        }

        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            font-size: 18px;
        }

        .btn-send:disabled {
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .btn-send:not(:disabled):active {
            transform: scale(0.92);
        }

        /* ===== TIMESTAMP ===== */
        .msg-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            padding: 0 4px;
        }
        .msg-row.user .msg-time { text-align: right; }
        .msg-row.ai .msg-time { text-align: left; }

        /* ===== OVERLAY FULLSCREEN ===== */
        .img-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .img-overlay.active {
            display: flex;
        }
        .img-overlay img {
            max-width: 95%;
            max-height: 90%;
            border-radius: 12px;
            object-fit: contain;
        }
        .img-overlay .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- HEADER -->
    <header class="chat-header">
        <div class="brand">
            <img src="/static/Logo-Divina3.png" alt="Divina Comida" class="brand-logo">
            <div>
                <div class="brand-name">Divina Comida</div>
                <div class="status"><span class="dot"></span> Assistente de Cardápio</div>
            </div>
        </div>
        <button class="btn-clear" onclick="clearChat()" title="Nova conversa">
            <i class="bi bi-arrow-counterclockwise"></i>
        </button>
    </header>

    <!-- MESSAGES -->
    <div class="chat-messages" id="chatMessages">
        <div class="welcome" id="welcomeScreen">
            <img src="/static/Logo-Divina3.png" alt="Divina Comida" class="welcome-logo">
            <h2>Assistente de Cardápio</h2>
            <p>Tire dúvidas sobre receitas, custos, fichas técnicas e planejamento do cardápio.</p>
            <div class="suggestions">
                <div class="suggestion-chip" onclick="sendSuggestion(this)">Sugira pratos novos para o almoço</div>
                <div class="suggestion-chip" onclick="sendSuggestion(this)">Calcule o custo de um prato</div>
                <div class="suggestion-chip" onclick="sendSuggestion(this)">Mostre a foto do filé grelhado</div>
                <div class="suggestion-chip" onclick="sendSuggestion(this)">Monte um cardápio semanal</div>
            </div>
        </div>
    </div>

    <!-- INPUT -->
    <div class="chat-input-area">
        <div class="input-wrapper">
            <textarea
                id="msgInput"
                rows="1"
                placeholder="Pergunte sobre cardápio, receitas, custos..."
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>
                <i class="bi bi-arrow-up"></i>
            </button>
        </div>
    </div>
</div>

<!-- OVERLAY FULLSCREEN PARA IMAGENS -->
<div class="img-overlay" id="imgOverlay" onclick="closeOverlay(event)">
    <button class="close-btn" onclick="closeOverlay(event)"><i class="bi bi-x"></i></button>
    <img id="overlayImg" src="" alt="">
</div>

<script>
    // ===== STATE =====
    const sessionId = crypto.randomUUID();
    let isStreaming = false;

    // ===== DOM =====
    const chatMessages = document.getElementById('chatMessages');
    const msgInput = document.getElementById('msgInput');
    const btnSend = document.getElementById('btnSend');

    // ===== AUTO-RESIZE TEXTAREA =====
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        btnSend.disabled = !el.value.trim() || isStreaming;
    }

    // ===== KEYBOARD =====
    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    // ===== SCROLL TO BOTTOM =====
    function scrollToBottom() {
        requestAnimationFrame(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    }

    // ===== TIME HELPER =====
    function getTime() {
        return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    // ===== OVERLAY FULLSCREEN =====
    function openOverlay(src) {
        document.getElementById('overlayImg').src = src;
        document.getElementById('imgOverlay').classList.add('active');
    }

    function closeOverlay(e) {
        if (e) e.stopPropagation();
        document.getElementById('imgOverlay').classList.remove('active');
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeOverlay();
    });

    // ===== BASIC MARKDOWN + DETECÇÃO DE [FOTO:arquivo] =====
    function formatText(text) {
        // Primeiro: substitui marcadores [FOTO:nome-arquivo.ext] por imagens
        text = text.replace(
            /\[FOTO:([^\]]+)\]/g,
            (match, filename) => {
                const src = `/static/pratos/${filename.trim()}`;
                return `<img src="${src}" alt="Foto do prato" class="dish-image" onclick="openOverlay('${src}')" onerror="this.style.display='none'"><div class="dish-caption">Toque na imagem para ampliar</div>`;
            }
        );

        // Depois: markdown normal
        text = text
            .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br>');

        return text;
    }

    // ===== RENDERIZA CARD DE PEDIDO =====
    function renderOrderCard(jsonStr) {
        try {
            const order = JSON.parse(jsonStr);
            if (!order.items || !order.items.length) return null;

            const itemsHtml = order.items.map(item => {
                const subtotal = (item.quantidade * item.preco_unitario).toFixed(2);
                return `
                    <div class="order-item">
                        <div class="order-item-left">
                            <span class="order-item-qty">${item.quantidade}×</span>
                            <div class="order-item-info">
                                <div class="order-item-name">${item.nome}</div>
                                ${item.observacao ? `<div class="order-item-obs">${item.observacao}</div>` : ''}
                            </div>
                        </div>
                        <span class="order-item-price">R$ ${Number(subtotal).toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                    </div>`;
            }).join('');

            const total = Number(order.total_estimado || 0).toLocaleString('pt-BR', {minimumFractionDigits:2});
            const totalServico = Number(order.total_com_servico || 0).toLocaleString('pt-BR', {minimumFractionDigits:2});

            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="order-card-header">
                    <span class="icon">🧾</span>
                    <span class="title">Resumo do Pedido</span>
                </div>
                <div class="order-items">${itemsHtml}</div>
                <div class="order-divider"></div>
                <div class="order-totals">
                    <div class="order-total-row">
                        <span>Subtotal</span>
                        <span>R$ ${total}</span>
                    </div>
                    <div class="order-total-row">
                        <span>Taxa de serviço (10%)</span>
                        <span>R$ ${Number(order.total_com_servico - order.total_estimado || 0).toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                    </div>
                    <div class="order-total-row final">
                        <span class="label">Total</span>
                        <span>R$ ${totalServico}</span>
                    </div>
                </div>`;
            return card;
        } catch (e) {
            console.warn('Falha ao parsear ORDER_JSON:', e);
            return null;
        }
    }

    // ===== PROCESSA TEXTO COM ORDER_JSON =====
    // Retorna { visibleText, orderJson } separando o bloco especial do texto normal
    function extractOrderBlock(text) {
        const openTag = '<<ORDER_JSON>>';
        const closeTag = '<</ORDER_JSON>>';
        const start = text.indexOf(openTag);
        const end = text.indexOf(closeTag);

        if (start === -1 || end === -1 || end <= start) {
            return { visibleText: text, orderJson: null };
        }

        const before = text.slice(0, start).trim();
        const jsonStr = text.slice(start + openTag.length, end).trim();
        const after = text.slice(end + closeTag.length).trim();
        const visibleText = [before, after].filter(Boolean).join('\n');

        return { visibleText, orderJson: jsonStr };
    }

    // ===== ADD MESSAGE BUBBLE =====
    function addMessage(text, role) {
        const ws = document.getElementById('welcomeScreen');
        if (ws) ws.remove();

        const row = document.createElement('div');
        row.className = `msg-row ${role}`;

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.innerHTML = formatText(text);

        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = getTime();

        row.appendChild(bubble);
        row.appendChild(time);
        chatMessages.appendChild(row);
        scrollToBottom();

        return bubble;
    }

    // ===== TYPING INDICATOR =====
    function showTyping() {
        const ws = document.getElementById('welcomeScreen');
        if (ws) ws.remove();

        const row = document.createElement('div');
        row.className = 'msg-row ai';
        row.id = 'typingRow';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.innerHTML = `
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>`;

        row.appendChild(bubble);
        chatMessages.appendChild(row);
        scrollToBottom();
    }

    function removeTyping() {
        const el = document.getElementById('typingRow');
        if (el) el.remove();
    }

    // ===== SEND MESSAGE =====
    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || isStreaming) return;

        // Reset input
        msgInput.value = '';
        msgInput.style.height = 'auto';
        btnSend.disabled = true;
        isStreaming = true;

        // Show user message
        addMessage(text, 'user');

        // Show typing
        showTyping();

        try {
            const res = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, session_id: sessionId }),
            });

            removeTyping();

            // Create AI bubble for streaming
            const aiBubble = addMessage('', 'ai');
            let fullText = '';
            let orderCardInserted = false;

            const reader = res.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const raw = line.slice(6).trim();
                    if (!raw) continue;

                    try {
                        const data = JSON.parse(raw);
                        if (data.type === 'delta') {
                            fullText += data.text;

                            // Extrai o bloco de pedido se existir (mesmo parcialmente recebido)
                            const { visibleText } = extractOrderBlock(fullText);
                            aiBubble.innerHTML = formatText(visibleText);
                            scrollToBottom();

                        } else if (data.type === 'error') {
                            fullText = '⚠️ ' + data.text;
                            aiBubble.innerHTML = formatText(fullText);
                        } else if (data.type === 'done') {
                            // Stream finalizado — tenta inserir o card de pedido
                            if (!orderCardInserted) {
                                const { visibleText, orderJson } = extractOrderBlock(fullText);
                                aiBubble.innerHTML = formatText(visibleText);

                                if (orderJson) {
                                    const card = renderOrderCard(orderJson);
                                    if (card) {
                                        // Insere o card após o bubble da IA, dentro do mesmo msg-row
                                        aiBubble.parentElement.appendChild(card);
                                        orderCardInserted = true;
                                        scrollToBottom();
                                    }
                                }
                            }
                        }
                    } catch {}
                }
            }

            // Segurança: se o stream terminou sem evento 'done', tenta o card assim mesmo
            if (!orderCardInserted) {
                const { visibleText, orderJson } = extractOrderBlock(fullText);
                aiBubble.innerHTML = formatText(visibleText);
                if (orderJson) {
                    const card = renderOrderCard(orderJson);
                    if (card) {
                        aiBubble.parentElement.appendChild(card);
                        scrollToBottom();
                    }
                }
            }

        } catch (err) {
            removeTyping();
            addMessage('⚠️ Erro de conexão. Tente novamente.', 'ai');
        }

        isStreaming = false;
        btnSend.disabled = !msgInput.value.trim();
        msgInput.focus();
    }

    // ===== SUGGESTIONS =====
    function sendSuggestion(el) {
        msgInput.value = el.textContent;
        sendMessage();
    }

    // ===== CLEAR CHAT =====
    async function clearChat() {
        try {
            await fetch('/api/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId }),
            });
        } catch {}

        chatMessages.innerHTML = `
            <div class="welcome" id="welcomeScreen">
                <img src="/static/Logo-Divina3.png" alt="Divina Comida" class="welcome-logo">
                <h2>Assistente de Cardápio</h2>
                <p>Tire dúvidas sobre receitas, custos, fichas técnicas e planejamento do cardápio.</p>
                <div class="suggestions">
                    <div class="suggestion-chip" onclick="sendSuggestion(this)">Sugira pratos novos para o almoço</div>
                    <div class="suggestion-chip" onclick="sendSuggestion(this)">Calcule o custo de um prato</div>
                    <div class="suggestion-chip" onclick="sendSuggestion(this)">Mostre a foto do filé grelhado</div>
                    <div class="suggestion-chip" onclick="sendSuggestion(this)">Monte um cardápio semanal</div>
                </div>
            </div>`;
    }

    // ===== ENABLE/DISABLE SEND BUTTON =====
    msgInput.addEventListener('input', () => {
        btnSend.disabled = !msgInput.value.trim() || isStreaming;
    });
</script>
