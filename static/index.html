<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divina Comida - Chat Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-color: #8B0000;
            /* Dark Red */
            --secondary-color: #FFD700;
            /* Gold */
            --bg-color: #fdfdfd;
            --chat-bg: #fff;
            --user-msg-bg: #8B0000;
            --user-msg-text: #fff;
            --bot-msg-bg: #f1f0f0;
            --bot-msg-text: #333;
            --caveat-font: "Caveat", cursive;
            --poppins-font: "Poppins", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--poppins-font);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header --- */
        .app-header {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo img {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--secondary-color);
        }

        .header-title {
            font-family: var(--caveat-font);
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            color: var(--secondary-color);
        }

        .header-subtitle {
            font-size: 0.85rem;
            margin: 0;
            opacity: 0.8;
        }

        .clear-chat-btn {
            background: none;
            border: none;
            color: white
